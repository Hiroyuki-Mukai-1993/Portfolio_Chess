name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (non-blocking for now)
        continue-on-error: true
        run: ruff check .

      - name: MyPy (non-blocking for now)
        continue-on-error: true
        run: mypy src

      - name: Pytest (required)
        run: pytest -q
